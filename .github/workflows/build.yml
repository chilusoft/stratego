name: build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.1.0)'
        required: true
        type: string
      build_number:
        description: 'Build number (e.g. 2)'
        required: true
        type: string
      upload_testflight:
        description: 'Upload to TestFlight'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          fi

      - name: Create key.properties
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "storeFile=upload-keystore.jks" >> android/key.properties
          fi

      - name: Set version
        run: |
          sed -i "s/version: .*/version: ${{ inputs.version }}+${{ inputs.build_number }}/" pubspec.yaml

      - name: Setup Android SDK
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Build web
        run: flutter build web --release --base-href=/stratego/

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - name: Set version
        run: |
          sed -i "" "s/version: .*/version: ${{ inputs.version }}+${{ inputs.build_number }}/" pubspec.yaml

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/Runner.app

  testflight:
    if: ${{ inputs.upload_testflight }}
    runs-on: macos-latest
    needs: ios
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - name: Set version
        run: |
          sed -i "" "s/version: .*/version: ${{ inputs.version }}+${{ inputs.build_number }}/" pubspec.yaml

      - name: Install fastlane
        run: |
          brew install fastlane

      - name: Install signing certs via fastlane match
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}" > /tmp/auth_key.p8
          KEY_ESCAPED=$(jq -Rs '.' /tmp/auth_key.p8)
          jq -n \
            --arg key_id "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --arg issuer_id "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --argjson key "$KEY_ESCAPED" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key}' \
            > /tmp/api_key.json
          fastlane match appstore --api_key_path /tmp/api_key.json

      - name: Build signed IPA
        run: flutter build ipa --release

      - name: Upload to TestFlight
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}" > /tmp/auth_key.p8
          KEY_ESCAPED=$(jq -Rs '.' /tmp/auth_key.p8)
          jq -n \
            --arg key_id "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --arg issuer_id "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --argjson key "$KEY_ESCAPED" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key}' \
            > /tmp/api_key.json
          fastlane run pilot ipa:"build/ios/ipa/Runner.ipa" skip_waiting_for_build_processing:true api_key_path:"/tmp/api_key.json"
